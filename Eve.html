
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Evening Checklist</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production Build) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

    <style>
        /* Global CSS and Print Utilities */
        .writing-vertical-rl { writing-mode: vertical-rl; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @media print {
            @page { size: landscape; margin: 5mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { padding: 2px !important; font-size: 9px !important; line-height: 1 !important; border: 1px solid #000 !important; }
            th > div { height: 75px !important; padding: 0 !important; }
            .boolean-icon { width: 10px !important; height: 10px !important; }
            .print-hidden { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-10 print:bg-white print:pb-0">
    
    <!-- React App Mount Point -->
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; color: #475569;">
            Initializing Checklist App... (If this remains on screen, please check your internet connection)
        </div>
    </div>

    <!-- Application Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Safe Local Storage Wrapper ---
        const safeStorage = {
            get: (key) => {
                try { return localStorage.getItem(key); } 
                catch(e) { console.warn("Storage access denied."); return null; }
            },
            set: (key, value) => {
                try { localStorage.setItem(key, value); } 
                catch(e) { console.warn("Storage write denied."); }
            },
            clear: () => {
                try { localStorage.clear(); } catch(e) {}
            }
        };

        // --- SVG Icons ---
        const Check = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const X = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const Edit = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const Save = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const ChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const SettingsIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const Printer = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
        const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const ClipboardCheck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><polyline points="9 14 11 16 15 11"></polyline></svg>;
        const ShieldCheck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>;
        const PenTool = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19 7-7 3 3-7 7-3-3z"></path><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="m2 2 7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>;

        // --- Error Boundary Component ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Application Crash:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                            <div className="max-w-xl w-full bg-white rounded-xl shadow-lg border-l-4 border-red-500 p-6">
                                <h1 className="text-xl font-bold text-slate-800 mb-2">Something went wrong</h1>
                                <p className="text-slate-600 mb-6 text-sm">The application encountered an unexpected error. This is usually caused by corrupted saved data.</p>
                                
                                <div className="bg-slate-100 rounded-md p-4 mb-6 overflow-auto max-h-40">
                                    <code className="text-xs text-red-600 font-mono break-all">
                                        {this.state.error && this.state.error.toString()}
                                    </code>
                                </div>

                                <button 
                                    onClick={() => { safeStorage.clear(); window.location.reload(); }}
                                    className="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg shadow-sm transition-colors"
                                >
                                    Reset App Data & Reload
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Configuration & Schemas ---
        const DEFAULT_CONFIG = {
            branchName: "CW Bhupindra Road Branch",
            monthYear: "2026-06",
            headerNote: '"THIS CHECKLIST CAN BE SIGNED, ONLY IF YOU HAVE CHECKED EACH & EVERYTHING \'YOURSELF\'"',
            subHeader: "Daily Evening Check List",
            customLabels: {}
        };

        const getDaysInMonth = (monthYear) => {
            if (!monthYear) return 31;
            const parts = monthYear.split('-');
            if (parts.length !== 2) return 31;
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            return new Date(year, month, 0).getDate();
        };

        const formatMonthYear = (monthYear) => {
            if (!monthYear) return "";
            // Replace hyphens to ensure Safari compatibility
            const safeDateString = monthYear.replace('-', '/') + '/01';
            const date = new Date(safeDateString);
            return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
        };

        // Evening Checklist Columns
        const COLUMNS = [
            { id: 'date', label: 'Date', type: 'number', readOnly: true },
            { id: 'routineDeposit', label: 'Routine Deposit', type: 'checkbox' },
            { id: 'stockWebSheet', label: 'Stock Web Sheet', type: 'checkbox' },
            { id: 'pendingBills', label: 'Pending Bills (Challan)', type: 'checkbox' },
            { id: 'expVouchers', label: 'Exp Vouchers', type: 'checkbox' },
            { id: 'rpSheet', label: 'RP Sheet', type: 'checkbox' },
            { id: 'settlement', label: 'Settlement', type: 'checkbox' },
            { id: 'finalReport', label: 'Final Report', type: 'checkbox' },
            { id: 'closingVideo', label: 'Closing Video', type: 'checkbox' },
            { id: 'cashInDrawer', label: 'Cash in Drawer', type: 'checkbox' },
            { id: 'drawerLockCheck', label: 'Drawer Lock Check', type: 'checkbox' },
            { id: 'stockInOut', label: 'Stock In/Out', type: 'checkbox' },
            { id: 'dsrReport', label: 'DSR Report Update', type: 'checkbox' },
            { id: 'exitFeedback', label: 'Exit Feedback', type: 'checkbox' },
            { id: 'visitorsBook', label: 'Visitor\'s Book Update', type: 'checkbox' },
            { id: 'walkinSheet', label: 'Walkin Sheet', type: 'checkbox' },
            { id: 'officeCounterClean', label: 'Office & Counter Clean', type: 'checkbox' },
            { id: 'dustbinEmpty', label: 'Dustbin empty', type: 'checkbox' },
            { id: 'allPlugsAcOff', label: 'All Plugs/ Lights AC OFF', type: 'checkbox' },
            { id: 'stockRpSetting', label: 'Stock & RP Section Setting', type: 'checkbox' },
            { id: 'pantryBathroomClean', label: 'Pantry & Bath-room Clean', type: 'checkbox' },
            { id: 'roomFreshenerOff', label: 'Room Freshener off', type: 'checkbox' },
            { id: 'plantsWater', label: 'Plants Water', type: 'checkbox' },
            { id: 'bagCheck', label: 'Bag Check', type: 'checkbox' },
            { id: 'alarm', label: 'Alarm', type: 'checkbox' },
            { id: 'remark', label: 'Remark', type: 'text' },
            { id: 'sign', label: 'Sign', type: 'text' },
        ];

        const FORM_GROUPS = [
            { title: "Financial & Reporting", icon: <FileText className="w-5 h-5 text-blue-500" />, fields: ['routineDeposit', 'pendingBills', 'expVouchers', 'settlement', 'finalReport', 'cashInDrawer', 'dsrReport'] },
            { title: "Operations & Documentation", icon: <ClipboardCheck className="w-5 h-5 text-indigo-500" />, fields: ['stockWebSheet', 'rpSheet', 'stockInOut', 'exitFeedback', 'visitorsBook', 'walkinSheet'] },
            { title: "Security & Safety", icon: <ShieldCheck className="w-5 h-5 text-red-500" />, fields: ['closingVideo', 'drawerLockCheck', 'allPlugsAcOff', 'bagCheck', 'alarm'] },
            { title: "Cleaning & Maintenance", icon: <Sparkles className="w-5 h-5 text-emerald-500" />, fields: ['officeCounterClean', 'dustbinEmpty', 'stockRpSetting', 'pantryBathroomClean', 'roomFreshenerOff', 'plantsWater'] },
            { title: "Sign-off & Remarks", icon: <PenTool className="w-5 h-5 text-purple-500" />, fields: ['remark', 'sign'] }
        ];

        const generateInitialData = (daysCount) => {
            return Array.from({ length: daysCount }, (_, i) => {
                const dayData = { date: i + 1 };
                COLUMNS.forEach(col => {
                    if (col.id !== 'date') { dayData[col.id] = col.type === 'checkbox' ? false : ''; }
                });
                return dayData;
            });
        };

        function App() {
            const [config, setConfig] = useState(DEFAULT_CONFIG);
            const [data, setData] = useState([]);
            const [selectedDay, setSelectedDay] = useState(null);
            const [isFormView, setIsFormView] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                const savedConfig = safeStorage.get('eveningChecklistConfig');
                if (savedConfig) { 
                    try { setConfig(JSON.parse(savedConfig)); } catch(e) {}
                }
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                const savedData = safeStorage.get(`eveningChecklistData_${config.monthYear}`);
                if (savedData) {
                    try {
                        const parsedData = JSON.parse(savedData);
                        if (Array.isArray(parsedData) && parsedData.length > 0) {
                            setData(parsedData);
                            return;
                        }
                    } catch(e) {}
                }
                setData(generateInitialData(getDaysInMonth(config.monthYear)));
            }, [config.monthYear]);

            const handleConfigChange = (e) => {
                const newConfig = { ...config, [e.target.name]: e.target.value };
                setConfig(newConfig);
                safeStorage.set('eveningChecklistConfig', JSON.stringify(newConfig));
            };

            const handleCustomLabelChange = (colId, value) => {
                const newConfig = { 
                    ...config, 
                    customLabels: { ...(config.customLabels || {}), [colId]: value } 
                };
                setConfig(newConfig);
                safeStorage.set('eveningChecklistConfig', JSON.stringify(newConfig));
            };

            const handleEditDay = (dayIndex) => {
                setSelectedDay(dayIndex);
                setIsFormView(true);
                window.scrollTo(0, 0);
            };

            const handleBackToTable = () => {
                setIsFormView(false);
                setSelectedDay(null);
            };

            const handleInputChange = (dayIndex, fieldId, value) => {
                const newData = [...data];
                newData[dayIndex] = { ...newData[dayIndex], [fieldId]: value };
                setData(newData);
                safeStorage.set(`eveningChecklistData_${config.monthYear}`, JSON.stringify(newData));
            };

            if (!isLoaded || data.length === 0) {
                return (
                    <div className="flex h-screen items-center justify-center font-sans">
                        <div className="text-center space-y-3">
                            <div className="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto"></div>
                            <p className="text-slate-600 font-medium">Loading Checklist Workspace...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <header className="bg-white shadow-sm border-b border-slate-200 pt-6 pb-4 px-4 sticky top-0 z-10 print-hidden print:shadow-none print:border-none print:pt-0 print:pb-2 print:static">
                        <div className="max-w-7xl mx-auto text-center space-y-2 relative">
                            <div className="absolute right-0 top-0 flex gap-2 print-hidden">
                                <button onClick={() => window.print()} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors" title="Print / Save as PDF">
                                    <Printer className="w-5 h-5" />
                                </button>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors" title="Settings">
                                    <SettingsIcon className="w-5 h-5" />
                                </button>
                            </div>
                            <p className="text-xs md:text-sm font-bold text-red-600 uppercase tracking-wide print:text-[10px]">
                                {config.headerNote}
                            </p>
                            <h1 className="text-lg md:text-2xl font-extrabold text-slate-900 uppercase print:text-lg print:m-0">
                                {config.branchName}
                            </h1>
                            <h2 className="text-base md:text-lg font-semibold text-slate-700 print:text-sm print:m-0">
                                {config.subHeader} FOR THE MONTH OF {formatMonthYear(config.monthYear)}
                            </h2>
                        </div>
                    </header>

                    <main className="max-w-[1400px] mx-auto mt-6 px-2 sm:px-4 lg:px-6 print:px-0 print:mt-2">
                        {(!isFormView || !data[selectedDay]) ? (
                            <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden print:border-none print:shadow-none">
                                <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 print-hidden">
                                    <h3 className="font-bold text-lg flex items-center gap-2">
                                        <Calendar className="w-5 h-5 text-slate-500" />
                                        Monthly Evening Overview
                                    </h3>
                                    <p className="text-sm text-slate-500 hidden sm:block">Click any row to edit that day's checklist.</p>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full border-collapse text-xs whitespace-nowrap table-fixed min-w-[800px]">
                                        <thead>
                                            <tr className="bg-slate-800 text-white print:bg-gray-200 print:text-black">
                                                <th className="border border-slate-700 p-2 sticky left-0 z-10 bg-slate-900 print:bg-gray-200 w-10 text-center print:border-black">Day</th>
                                                {COLUMNS.slice(1).map(col => {
                                                    const currentLabel = (config.customLabels && config.customLabels[col.id]) || col.label;
                                                    return (
                                                        <th key={col.id} className="border border-slate-700 p-1 font-medium w-10 print:border-black align-bottom">
                                                            <div className="writing-vertical-rl rotate-180 h-32 flex items-center justify-center mx-auto text-center leading-tight">
                                                                {currentLabel}
                                                            </div>
                                                        </th>
                                                    )
                                                })}
                                                <th className="border border-slate-700 p-2 font-medium w-16 print-hidden">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {data.map((row, index) => (
                                                <tr key={row.date} className={`hover:bg-blue-50 transition-colors cursor-pointer print:hover:bg-transparent ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50'}`} onClick={() => handleEditDay(index)}>
                                                    <td className="border border-slate-200 p-1 sticky left-0 z-10 bg-inherit font-bold text-center border-r-slate-300 print:border-black">{row.date}</td>
                                                    {COLUMNS.slice(1).map(col => (
                                                        <td key={col.id} className="border border-slate-200 p-1 text-center print:border-black overflow-hidden">
                                                            {col.type === 'checkbox' ? (
                                                                <div className="flex justify-center items-center h-full">
                                                                    {row[col.id] ? 
                                                                        <Check className="w-4 h-4 text-green-600 boolean-icon print:text-black" /> : 
                                                                        <X className="w-4 h-4 text-red-500 opacity-50 boolean-icon print:text-black print:opacity-100" />
                                                                    }
                                                                </div>
                                                            ) : (
                                                                <span className="truncate max-w-[80px] inline-block text-[10px] print:text-[8px] px-1">
                                                                    {row[col.id] || <span className="text-slate-300 print-hidden">-</span>}
                                                                </span>
                                                            )}
                                                        </td>
                                                    ))}
                                                    <td className="border border-slate-200 p-1 text-center print-hidden">
                                                        <button onClick={(e) => { e.stopPropagation(); handleEditDay(index); }} className="p-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition-colors mx-auto block" title="Edit Evening Data">
                                                            <Edit className="w-3.5 h-3.5" />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl shadow border border-slate-200 max-w-4xl mx-auto overflow-hidden">
                                <div className="bg-slate-800 text-white p-4 flex items-center justify-between sticky top-0 md:top-[100px] z-20 shadow-md">
                                    <div className="flex items-center gap-4">
                                        <button onClick={handleBackToTable} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors flex items-center gap-1">
                                            <ChevronLeft className="w-5 h-5" />
                                            <span className="hidden sm:inline">Back</span>
                                        </button>
                                        <div>
                                            <h2 className="text-xl font-bold">Evening Day {data[selectedDay].date}</h2>
                                            <p className="text-slate-300 text-sm">Fill out the checklist for {data[selectedDay].date} {formatMonthYear(config.monthYear)}</p>
                                        </div>
                                    </div>
                                    <button onClick={handleBackToTable} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 transition-colors shadow-sm">
                                        <Save className="w-5 h-5" />
                                        <span className="hidden sm:inline">Save</span>
                                    </button>
                                </div>
                                <div className="p-4 sm:p-6 space-y-8 bg-slate-50">
                                    {FORM_GROUPS.map((group, groupIdx) => (
                                        <div key={groupIdx} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                            <div className="bg-slate-100 border-b border-slate-200 px-4 py-3 flex items-center gap-2">
                                                {group.icon}
                                                <h3 className="font-bold text-slate-800">{group.title}</h3>
                                            </div>
                                            <div className="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                {group.fields.map(fieldId => {
                                                    const col = COLUMNS.find(c => c.id === fieldId);
                                                    if (!col) return null;
                                                    const value = data[selectedDay][fieldId];
                                                    const currentLabel = (config.customLabels && config.customLabels[fieldId]) || col.label;
                                                    return (
                                                        <div key={fieldId} className="flex flex-col gap-1.5 p-3 rounded-lg border border-slate-100 bg-slate-50 hover:bg-white hover:border-blue-200 transition-colors">
                                                            <label htmlFor={fieldId} className="text-sm font-semibold text-slate-700 flex justify-between items-center cursor-pointer">
                                                                {currentLabel}
                                                            </label>
                                                            {col.type === 'checkbox' ? (
                                                                <button id={fieldId} onClick={() => handleInputChange(selectedDay, fieldId, !value)} className={`mt-1 relative inline-flex h-8 w-16 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 shadow-inner ${value ? 'bg-green-500' : 'bg-slate-300'}`} role="switch" aria-checked={value}>
                                                                    <span className={`pointer-events-none relative inline-block h-7 w-7 transform rounded-full bg-white shadow-md ring-0 transition duration-200 ease-in-out ${value ? 'translate-x-8' : 'translate-x-0'}`}>
                                                                        <span className={`absolute inset-0 flex h-full w-full items-center justify-center transition-opacity duration-200 ease-in ${value ? 'opacity-100' : 'opacity-0'}`}>
                                                                            <Check className="h-4 w-4 text-green-500" />
                                                                        </span>
                                                                        <span className={`absolute inset-0 flex h-full w-full items-center justify-center transition-opacity duration-200 ease-in ${value ? 'opacity-0' : 'opacity-100'}`}>
                                                                            <X className="h-4 w-4 text-slate-400" />
                                                                        </span>
                                                                    </span>
                                                                </button>
                                                            ) : (
                                                                <input type="text" id={fieldId} value={value || ''} onChange={(e) => handleInputChange(selectedDay, fieldId, e.target.value)} className="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border" placeholder={`Enter ${currentLabel.toLowerCase()}`} />
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-slate-100 p-4 border-t border-slate-200 flex justify-end gap-3">
                                    <button onClick={handleBackToTable} className="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-sm">
                                        Save & Return to Table
                                    </button>
                                </div>
                            </div>
                        )}

                        {isSettingsOpen && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 print-hidden">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                                        <h3 className="font-bold text-lg flex items-center gap-2 text-slate-800">
                                            <SettingsIcon className="w-5 h-5 text-slate-500" />
                                            Checklist Settings
                                        </h3>
                                        <button onClick={() => setIsSettingsOpen(false)} className="text-slate-400 hover:text-slate-600 hover:bg-slate-200 p-1 rounded transition-colors">
                                            <X className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="p-4 space-y-4 max-h-[65vh] overflow-y-auto custom-scrollbar">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Month & Year</label>
                                            <input type="month" name="monthYear" value={config.monthYear} onChange={handleConfigChange} className="w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border bg-slate-50" />
                                            <p className="text-xs text-slate-500 mt-1">Saves separate records for each selected month.</p>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Branch Name</label>
                                            <input type="text" name="branchName" value={config.branchName} onChange={handleConfigChange} className="w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Sub Header</label>
                                            <input type="text" name="subHeader" value={config.subHeader} onChange={handleConfigChange} className="w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-1">Header Note</label>
                                            <textarea name="headerNote" value={config.headerNote} onChange={handleConfigChange} rows="2" className="w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border"></textarea>
                                        </div>
                                        <div className="pt-4 border-t border-slate-200">
                                            <h4 className="font-semibold text-slate-800 mb-2 flex items-center gap-2">
                                                <Edit className="w-4 h-4 text-blue-500" />
                                                Customize Column Headers
                                            </h4>
                                            <p className="text-xs text-slate-500 mb-3">Edit any header name. Leave blank to use default.</p>
                                            <div className="space-y-3 bg-slate-50 p-3 rounded-lg border border-slate-200 max-h-64 overflow-y-auto">
                                                {COLUMNS.filter(c => c.id !== 'date').map(col => (
                                                    <div key={col.id} className="relative">
                                                        <label className="block text-xs font-medium text-slate-500 mb-1">{col.label}</label>
                                                        <input type="text" placeholder={col.label} value={(config.customLabels && config.customLabels[col.id] !== undefined) ? config.customLabels[col.id] : col.label} onChange={(e) => handleCustomLabelChange(col.id, e.target.value)} className="w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border" />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-100 p-4 border-t border-slate-200 flex justify-end">
                                        <button onClick={() => setIsSettingsOpen(false)} className="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium shadow-sm">
                                            Save & Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // Initialize App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
