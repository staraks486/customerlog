

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Shoe Rack Log - Digital Sheet</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for the app logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js" crossorigin="anonymous"></script>
    <!-- html2canvas for Save as Image feature -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* High-visibility Monospace Alignment */
        .tally-font {
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 0.2em;
            text-indent: 0.1em;
            word-break: break-all;
            line-height: 1.2;
        }

        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body { background: white !important; }
            .print-hide { display: none !important; }
            .no-shadow { box-shadow: none !important; border: 2px solid black !important; }
            input, textarea { border: none !important; outline: none !important; }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }

        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef, useCallback } = React;

        const App = () => {
            const sheetRef = useRef(null);

            // Main State
            const [rows, setRows] = useState([
                { id: 1, name: 'CHARANJIT SINGH', target: '', am: { a: '', c: '', b: '' }, al: { a: '', c: '', b: '' }, cm: { a: '', c: '', b: '' }, cl: { a: '', c: '', b: '' }, rp: '', ret: '', book: '' },
                { id: 2, name: 'JASSI SINGH', target: '3.7780', am: { a: '', c: 'III', b: '' }, al: { a: '', c: 'I', b: '' }, cm: { a: '✔️✔️✔️', c: 'III', b: '🍬🍬🍬' }, cl: { a: '', c: '', b: '' }, rp: '', ret: '', book: '' },
                { id: 3, name: 'ARVIND', target: '3.7780', am: { a: '', c: 'I', b: '@' }, al: { a: '', c: 'I', b: '' }, cm: { a: '', c: '', b: '' }, cl: { a: '', c: '', b: '' }, rp: '', ret: '', book: '' },
            ]);

            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [mt, setMt] = useState('3.0');
            const [titleText, setTitleText] = useState('SHOE RACK');
            const [storeName, setStoreName] = useState('(DLF Colony)');
            
            const [activeCell, setActiveCell] = useState(null); 
            const [activeTier, setActiveTier] = useState('a'); 
            const [confirmClear, setConfirmClear] = useState(false);
            
            const [declaration, setDeclaration] = useState('I CERTIFY, THE INFORMATION GIVEN BELOW IS TRUE & CORRECT OF MY BEST KNOWLEDGE');
            const [managerSign, setManagerSign] = useState('ARVIND');
            const [managerRole, setManagerRole] = useState('MANAGER');
            const [confirmedDateText, setConfirmedDateText] = useState(new Date().toLocaleDateString('en-GB'));
            const [mobileBans, setMobileBans] = useState(['', '']);
            const [suspended, setSuspended] = useState([{from: '', till: ''}, {from: '', till: ''}]);
            const [phoneCalls, setPhoneCalls] = useState({ today: '0', total: '', reason: '' });

            // New states for Dashboard
            const [activeTab, setActiveTab] = useState('entry'); // 'entry' or 'dashboard'
            const [savedRecords, setSavedRecords] = useState(() => {
                try {
                    const item = window.localStorage.getItem('shoeRackRecords');
                    return item ? JSON.parse(item) : [];
                } catch (error) {
                    console.error(error);
                    return [];
                }
            });
            const [toastMessage, setToastMessage] = useState('');
            const [confirmClearDash, setConfirmClearDash] = useState(false);

            const [popupPos, setPopupPos] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            const symbols = [
                { key: 'I', label: 'Walkin/Convert' },
                { key: 'L', label: 'Leave' },
                { key: '✔️', label: 'Verified' },
                { key: '@', label: 'DOB' },
                { key: 'E', label: 'Existing' },
                { key: 'X', label: 'Not Given' },
                { key: 'O', label: 'Ghera System' },
                { key: 'A', label: 'Accessories' },
                { key: '-', label: 'Attended' },
                { key: 'C', label: 'Candy' },
                { key: '↓', label: 'Pointer' },
                { key: '❌', label: 'Rejected' },
                { key: '🍬', label: 'Sweet' },
                { key: '📞', label: 'Call' },
                { key: '⭐', label: 'Star' }
            ];

            // Save Functions
            const handlePrint = () => {
                window.print();
            };

            const handleSaveImage = async () => {
                if (!sheetRef.current) return;
                setActiveCell(null);
                try {
                    const canvas = await html2canvas(sheetRef.current, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        logging: false,
                        ignoreElements: (el) => el.classList.contains('print-hide')
                    });
                    const imageData = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    const fileName = `${titleText}_Report_${confirmedDateText.replace(/\//g, '-')}.png`;
                    link.href = imageData;
                    link.download = fileName;
                    link.click();
                } catch (error) {
                    console.error("Image capture failed:", error);
                }
            };

            const clearSheetData = () => {
                setRows(prevRows => prevRows.map(row => ({
                    ...row,
                    am: { a: '', c: '', b: '' },
                    al: { a: '', c: '', b: '' },
                    cm: { a: '', c: '', b: '' },
                    cl: { a: '', c: '', b: '' },
                    rp: '',
                    ret: '',
                    book: ''
                })));
                setPhoneCalls({ today: '0', total: '', reason: '' });
                setSuspended([{from: '', till: ''}, {from: '', till: ''}]);
                setMobileBans(['', '']);
                setConfirmClear(false);
            };

            const handleSaveToDashboard = () => {
                const grandAttended = rows.reduce((acc, row) => acc + countMarks(row.am) + countMarks(row.al), 0);
                const grandConverted = rows.reduce((acc, row) => acc + countMarks(row.cm) + countMarks(row.cl), 0);
                
                const newRecord = {
                    id: Date.now(),
                    date: date,
                    confirmedDateText: confirmedDateText,
                    attended: grandAttended,
                    converted: grandConverted,
                    rp: sumCol('rp'),
                    ret: sumCol('ret'),
                    book: sumCol('book'),
                    target: mt
                };

                const updatedRecords = [...savedRecords, newRecord];
                setSavedRecords(updatedRecords);
                try {
                    window.localStorage.setItem('shoeRackRecords', JSON.stringify(updatedRecords));
                } catch (e) {
                    console.error("Could not save to localStorage", e);
                }
                
                setToastMessage('Record Saved Successfully! Check the Dashboard tab.');
                setTimeout(() => setToastMessage(''), 3000);
            };

            const deleteRecord = (id) => {
                const updatedRecords = savedRecords.filter(r => r.id !== id);
                setSavedRecords(updatedRecords);
                window.localStorage.setItem('shoeRackRecords', JSON.stringify(updatedRecords));
            };

            const clearAllRecords = () => {
                setSavedRecords([]);
                window.localStorage.removeItem('shoeRackRecords');
                setConfirmClearDash(false);
            };

            const addRow = () => {
                setRows([...rows, { 
                    id: Date.now(), 
                    name: 'NEW EMPLOYEE', 
                    target: '', 
                    am: {a:'',c:'',b:''}, 
                    al:{a:'',c:'',b:''}, 
                    cm:{a:'',c:'',b:''}, 
                    cl:{a:'',c:'',b:''}, 
                    rp:'', 
                    ret:'', 
                    book:'' 
                }]);
            };

            const deleteRow = (id) => {
                if (rows.length <= 1) return;
                setRows(rows.filter(r => r.id !== id));
            }

            // Dragging Logic
            const onDragStart = (e) => {
                setIsDragging(true);
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                dragOffset.current = { x: clientX - popupPos.x, y: clientY - popupPos.y };
            };

            const onDragMove = useCallback((e) => {
                if (!isDragging) return;
                const clientX = (e.type === 'touchmove' ? e.touches[0].clientX : e.clientX);
                const clientY = (e.type === 'touchmove' ? e.touches[0].clientY : e.clientY);
                setPopupPos({ x: clientX - dragOffset.current.x, y: clientY - dragOffset.current.y });
            }, [isDragging]);

            const onDragEnd = () => setIsDragging(false);

            useEffect(() => {
                if (isDragging) {
                    window.addEventListener('mousemove', onDragMove);
                    window.addEventListener('mouseup', onDragEnd);
                    window.addEventListener('touchmove', onDragMove);
                    window.addEventListener('touchend', onDragEnd);
                } else {
                    window.removeEventListener('mousemove', onDragMove);
                    window.removeEventListener('mouseup', onDragEnd);
                    window.removeEventListener('touchmove', onDragMove);
                    window.removeEventListener('touchend', onDragEnd);
                }
                return () => {
                    window.removeEventListener('mousemove', onDragMove);
                    window.removeEventListener('mouseup', onDragEnd);
                    window.removeEventListener('touchmove', onDragMove);
                    window.removeEventListener('touchend', onDragEnd);
                };
            }, [isDragging, onDragMove]);

            useEffect(() => {
                if (activeCell && popupPos.x === 0 && popupPos.y === 0) {
                    // Safe calculation to prevent popup from rendering off-screen
                    const safeX = Math.max(10, window.innerWidth / 2 - 180);
                    const safeY = Math.max(10, window.innerHeight / 2 - 150);
                    setPopupPos({ x: safeX, y: safeY });
                }
            }, [activeCell, popupPos.x, popupPos.y]);

            const countMarks = (cellData) => {
                if (!cellData || !cellData.c) return 0;
                return (cellData.c.match(/I/g) || []).length;
            };

            const sumCol = (field) => rows.reduce((acc, row) => acc + (parseFloat(row[field]) || 0), 0);

            const updateRow = (id, field, value, tier) => {
                setRows(rows.map(row => {
                    if (row.id === id) {
                        if (tier) return { ...row, [field]: { ...row[field], [tier]: value } };
                        return { ...row, [field]: value };
                    }
                    return row;
                }));
            };

            const addSymbol = (symbolKey) => {
                if (!activeCell) return;
                const row = rows.find(r => r.id === activeCell.rowId);
                let targetTier = activeTier;
                if (symbolKey === 'I' || symbolKey === 'L') targetTier = 'c';
                
                // --- Strict Validation: Attend before Convert ---
                const isConvertedField = activeCell.field === 'cm' || activeCell.field === 'cl';
                if (isConvertedField) {
                    const attendedField = activeCell.field === 'cm' ? 'am' : 'al';
                    const attendedCount = countMarks(row[attendedField]);
                    const currentTierStr = row[activeCell.field][targetTier] || '';
                    // Remove variation selectors for accurate length counting of emojis
                    const currentTierLen = Array.from(currentTierStr.replace(/\uFE0F/g, '')).length;

                    if (currentTierLen >= attendedCount) {
                        setToastMessage(`⚠️ Error: Need more 'Attended' marks first! (Attended: ${attendedCount})`);
                        setTimeout(() => setToastMessage(''), 3000);
                        return;
                    }
                }

                const currentVal = row[activeCell.field][targetTier] || '';
                updateRow(activeCell.rowId, activeCell.field, currentVal + symbolKey, targetTier);
            };

            const deleteOneSymbol = () => {
                if (!activeCell) return;
                const row = rows.find(r => r.id === activeCell.rowId);
                const currentVal = row[activeCell.field][activeTier] || '';
                if (currentVal.length === 0) return;
                
                // Robust emoji deletion
                let charArray = Array.from(currentVal);
                let deletedChar = charArray[charArray.length - 1];
                let isVariationSelector = false;
                
                if (deletedChar === '\uFE0F') {
                    isVariationSelector = true;
                    deletedChar = charArray[charArray.length - 2];
                }

                // --- Validation: Don't delete Attended if it breaks Converted bounds ---
                const isAttendedField = activeCell.field === 'am' || activeCell.field === 'al';
                if (isAttendedField && activeTier === 'c' && deletedChar === 'I') {
                    const convertedField = activeCell.field === 'am' ? 'cm' : 'cl';
                    const currentAttendedCount = countMarks(row[activeCell.field]);
                    
                    const convTop = Array.from((row[convertedField].a || '').replace(/\uFE0F/g, '')).length;
                    const convCenter = Array.from((row[convertedField].c || '').replace(/\uFE0F/g, '')).length;
                    const convBottom = Array.from((row[convertedField].b || '').replace(/\uFE0F/g, '')).length;
                    const maxConv = Math.max(convTop, convCenter, convBottom);

                    if (currentAttendedCount - 1 < maxConv) {
                        setToastMessage(`⚠️ Error: Cannot delete! Reduce 'Converted' marks first.`);
                        setTimeout(() => setToastMessage(''), 3000);
                        return;
                    }
                }

                if (isVariationSelector) {
                    charArray.splice(-2, 2);
                } else {
                    charArray.pop();
                }
                
                const newVal = charArray.join('');
                updateRow(activeCell.rowId, activeCell.field, newVal, activeTier);
            };

            const resetActiveCell = () => {
                if (!activeCell) return;
                const row = rows.find(r => r.id === activeCell.rowId);
                
                const isAttendedField = activeCell.field === 'am' || activeCell.field === 'al';
                if (isAttendedField) {
                    const convertedField = activeCell.field === 'am' ? 'cm' : 'cl';
                    const convTop = Array.from((row[convertedField].a || '').replace(/\uFE0F/g, '')).length;
                    const convCenter = Array.from((row[convertedField].c || '').replace(/\uFE0F/g, '')).length;
                    const convBottom = Array.from((row[convertedField].b || '').replace(/\uFE0F/g, '')).length;
                    
                    if (convTop > 0 || convCenter > 0 || convBottom > 0) {
                        setToastMessage(`⚠️ Error: Cannot reset! Clear the 'Converted' cell first.`);
                        setTimeout(() => setToastMessage(''), 3000);
                        return;
                    }
                }

                updateRow(activeCell.rowId, activeCell.field, {a:'', c:'', b:''});
            };

            const grandAttended = rows.reduce((acc, row) => acc + countMarks(row.am) + countMarks(row.al), 0);
            const grandConverted = rows.reduce((acc, row) => acc + countMarks(row.cm) + countMarks(row.cl), 0);
            const grandPct = grandAttended > 0 ? Math.round((grandConverted / grandAttended) * 100) : 0;

            const maxAttended = Math.max(...savedRecords.map(r => r.attended), 1);
            const totalAttendedAllTime = savedRecords.reduce((acc, r) => acc + r.attended, 0);
            const totalConvertedAllTime = savedRecords.reduce((acc, r) => acc + r.converted, 0);
            const avgConvPct = totalAttendedAllTime > 0 ? Math.round((totalConvertedAllTime / totalAttendedAllTime) * 100) : 0;

            return (
                <div className="min-h-screen bg-slate-200 p-2 md:p-6 print:bg-white print:p-0">
                    {toastMessage && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 ${toastMessage.includes('Error') ? 'bg-red-600' : 'bg-green-600'} text-white px-6 py-3 rounded-full font-black shadow-2xl z-[200] animate-bounce print-hide`}>
                            {toastMessage}
                        </div>
                    )}

                    {/* Tabs Navigation */}
                    <div className="max-w-[1180px] mx-auto mb-2 print-hide flex gap-2">
                        <button onClick={() => setActiveTab('entry')} className={`px-6 py-2 rounded-t-lg font-black uppercase transition-all flex items-center gap-2 ${activeTab === 'entry' ? 'bg-white text-blue-700 shadow-md translate-y-[2px]' : 'bg-slate-300 text-slate-500 hover:bg-slate-100'}`}>📝 Data Entry Sheet</button>
                        <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-2 rounded-t-lg font-black uppercase transition-all flex items-center gap-2 ${activeTab === 'dashboard' ? 'bg-white text-blue-700 shadow-md translate-y-[2px]' : 'bg-slate-300 text-slate-500 hover:bg-slate-100'}`}>📊 Analytics Dashboard</button>
                    </div>

                    {activeTab === 'entry' ? (
                    <div ref={sheetRef} className="max-w-[1180px] mx-auto bg-white border-2 border-black relative shadow-2xl print:shadow-none print:border-black no-shadow">
                        
                        {/* Top Header Bar */}
                        <div className="flex justify-between items-center px-4 py-1.5 border-b border-black text-[10px] font-bold bg-slate-50 uppercase">
                            <div className="flex gap-4 items-center flex-1">
                                <div className="flex gap-1 items-center shrink-0">
                                    <span className="text-slate-400">SIGN:</span> 
                                    <input type="text" className="border-b border-slate-300 w-24 outline-none bg-transparent font-black uppercase" value={managerSign} onChange={(e) => setManagerSign(e.target.value)} />
                                </div>
                                <input type="text" className="flex-1 opacity-80 bg-transparent outline-none border-b border-transparent focus:border-slate-300 font-bold" value={declaration} onChange={(e) => setDeclaration(e.target.value)} />
                            </div>
                            <div className="flex gap-1 items-center shrink-0 ml-4">
                                <input type="text" className="opacity-50 text-[9px] bg-transparent outline-none border-none text-right font-black uppercase w-20" value={managerRole} onChange={(e) => setManagerRole(e.target.value)} />
                                <input type="text" className="bg-transparent border-none outline-none text-right w-24 text-blue-700 font-black uppercase" value={managerSign} onChange={(e) => setManagerSign(e.target.value)} />
                            </div>
                        </div>

                        {/* Branding & Summary Header */}
                        <div className="flex border-b border-black h-36 bg-white">
                            <div className="w-40 p-4 border-r border-black flex flex-col justify-center gap-3">
                                <div className="flex items-center gap-2 font-bold text-[11px]">
                                    <span className="text-slate-400 shrink-0 uppercase tracking-tighter">M.T. :-</span>
                                    <input type="text" value={mt} onChange={e => setMt(e.target.value)} className="border-b border-black w-full outline-none font-black text-center text-sm" />
                                </div>
                                <div className="flex flex-col gap-1 font-bold">
                                    <span className="text-slate-500 text-[8px] uppercase font-black">Sheet Date:</span>
                                    <input type="date" value={date} onChange={e => { setDate(e.target.value); setConfirmedDateText(new Date(e.target.value).toLocaleDateString('en-GB')); }} className="w-full outline-none font-black border-2 border-slate-200 rounded p-1 text-[11px] bg-slate-50" />
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col items-center justify-center p-2 border-r border-black">
                                <input type="text" value={titleText} onChange={(e) => setTitleText(e.target.value.toUpperCase())} className="text-4xl font-black italic tracking-tight text-slate-900 bg-transparent outline-none text-center w-full" />
                                <input type="text" value={storeName} onChange={e => setStoreName(e.target.value)} className="text-xl font-bold text-blue-700 bg-transparent outline-none text-center w-full mt-1" />
                            </div>

                            <div className="w-72 bg-slate-900 text-white flex flex-col text-center border-l border-black">
                                <div className="text-[9px] font-black border-b border-slate-800 p-2 bg-slate-950 uppercase italic text-slate-400 tracking-wider">Walkins / Conv / Conversion %</div>
                                <div className="flex-1 flex items-center justify-around font-black text-3xl italic px-4 py-2">
                                    <span className="text-slate-300">{grandAttended}</span>
                                    <span className="text-slate-700">/</span>
                                    <span className="text-slate-300">{grandConverted}</span>
                                    <span className="text-slate-700">/</span>
                                    <span className="text-blue-400">{grandPct}%</span>
                                </div>
                                <div className="grid grid-cols-3 border-t border-slate-800 bg-slate-950 font-black divide-x divide-slate-800 uppercase text-center">
                                    <div className="flex flex-col p-2">
                                        <span className="text-[7px] text-slate-500">Total RP</span>
                                        <span className="text-sm text-white">{sumCol('rp')}</span>
                                    </div>
                                    <div className="flex flex-col p-2">
                                        <span className="text-[7px] text-slate-500">Total Ret.</span>
                                        <span className="text-sm text-white">{sumCol('ret')}</span>
                                    </div>
                                    <div className="flex flex-col p-2">
                                        <span className="text-[7px] text-slate-500">Total Book</span>
                                        <span className="text-sm text-white">{sumCol('book')}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Grid */}
                        <div className="flex relative bg-white overflow-x-auto">
                            <table className="flex-1 border-collapse table-fixed min-w-[1100px]">
                                <thead>
                                    <tr className="bg-slate-100 uppercase font-black text-[10px] text-slate-700">
                                        <th rowSpan="2" className="border-b border-r border-black p-3 w-64 text-left">Employee Name</th>
                                        <th colSpan="2" className="border-b border-r border-black p-1 text-center">Attended</th>
                                        <th colSpan="2" className="border-b border-r border-black p-1 text-center">Converted</th>
                                        <th rowSpan="2" className="border-b border-r border-black p-1 w-32 text-center bg-blue-50/50 italic">Individual Total</th>
                                        <th rowSpan="2" className="border-b border-r border-black p-1 w-16 text-center text-[8px]">RP</th>
                                        <th rowSpan="2" className="border-b border-r border-black p-1 w-16 text-center text-[8px]">Ret.</th>
                                        <th rowSpan="2" className="border-b border-black p-1 w-16 text-center text-[8px]">Book</th>
                                    </tr>
                                    <tr className="bg-slate-50 text-[8px] font-black">
                                        <th className="border-b border-r border-black p-1 w-32">MENS</th>
                                        <th className="border-b border-r border-black p-1 w-32">LADIES</th>
                                        <th className="border-b border-r border-black p-1 w-32">MENS</th>
                                        <th className="border-b border-r border-black p-1 w-32">LADIES</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rows.map(row => {
                                        const att = countMarks(row.am) + countMarks(row.al);
                                        const conv = countMarks(row.cm) + countMarks(row.cl);
                                        const pct = att > 0 ? Math.round((conv / att) * 100) : 0;
                                        return (
                                            <tr key={row.id} className="h-16 group">
                                                <td className="border-b border-r border-black p-2 bg-slate-50/20 relative text-left">
                                                    <div className="flex items-center gap-1">
                                                        <button onClick={() => deleteRow(row.id)} className="print-hide opacity-0 group-hover:opacity-100 text-red-500 p-1 hover:bg-red-50 rounded transition-all"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg></button>
                                                        <input type="text" value={row.name} onChange={e => updateRow(row.id, 'name', e.target.value.toUpperCase())} className="flex-1 font-black uppercase bg-transparent outline-none text-[12px] tracking-tight" />
                                                    </div>
                                                    <div className="flex items-center gap-1 mt-1 text-[10px] font-bold italic text-slate-500 ml-6"><span>T.T. :-</span><input type="text" value={row.target} onChange={e => updateRow(row.id, 'target', e.target.value)} className="bg-transparent border-b border-slate-300 w-full outline-none font-black" /></div>

                                                        <div className="w-full h-full flex flex-col justify-between items-center py-1 overflow-hidden text-center tally-font">
                                                            <div className="text-[12px] font-black text-blue-700 h-[25%] flex items-center justify-center leading-none uppercase">{row[f].a}</div>
                                                            <div className={`text-2xl font-black h-[50%] flex items-center justify-center leading-none tracking-widest ${row[f].c.includes('L') ? 'text-red-600' : 'text-slate-900'}`}>{row[f].c}</div>
                                                            <div className="text-[12px] font-black text-slate-600 h-[25%] flex items-center justify-center leading-none uppercase">{row[f].b}</div>
                                                        </div>
                                                    </td>

                                                    <span className="text-slate-500">{att}</span> / <span className="text-slate-900">{conv}</span> / <span className="text-blue-700">{pct}%</span>

                                                <td className="border-b border-r border-black p-0 text-center"><input type="number" value={row.rp} onChange={e => updateRow(row.id, 'rp', e.target.value)} className="w-full h-full p-1 text-center outline-none bg-transparent text-[11px] font-black" placeholder="0" /></td>
                                                <td className="border-b border-r border-black p-0 text-center"><input type="number" value={row.ret} onChange={e => updateRow(row.id, 'ret', e.target.value)} className="w-full h-full p-1 text-center outline-none bg-transparent text-[11px] font-black" placeholder="0" /></td>
                                                <td className="border-b border-black p-0 text-center"><input type="number" value={row.book} onChange={e => updateRow(row.id, 'book', e.target.value)} className="w-full h-full p-1 text-center outline-none bg-transparent text-[11px] font-black" placeholder="0" /></td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>

                        {/* Action Row */}
                        <div className="print-hide border-b border-black bg-slate-50 p-2 flex justify-center">

                        {/* Admin Footer Grid */}
                        <div className="flex border-t border-black min-h-[110px] text-[10px] bg-white divide-x divide-black">
                            <div className="w-1/4 p-3 flex flex-col gap-2 uppercase italic text-slate-700">
                                <span className="font-black text-[9px] border-b-2 border-slate-100 pb-1 uppercase">Suspended /</span>
                                {suspended.map((s, i) => (
                                    <div key={i} className="border-b border-slate-200 flex justify-between h-5 items-center gap-2 text-center">
                                        <span className="text-[7px] font-bold">FROM:</span>
                                        <input type="text" className="w-1/3 outline-none bg-transparent text-black font-black text-center" value={s.from} onChange={e => { const n = [...suspended]; n[i] = {...n[i], from: e.target.value}; setSuspended(n); }} /> 
                                        <span className="text-[7px] font-bold">TILL:</span>
                                        <input type="text" className="w-1/3 outline-none bg-transparent text-black font-black text-center" value={s.till} onChange={e => { const n = [...suspended]; n[i] = {...n[i], till: e.target.value}; setSuspended(n); }} />
                                    </div>
                                ))}
                            </div>

                            <div className="w-1/4 p-3 flex flex-col gap-2 uppercase italic text-slate-700 font-black">
                                <span className="font-black text-[9px] border-b-2 border-slate-100 pb-1 uppercase">Mobile Ban List :</span>
                                {mobileBans.map((ban, i) => (
                                    <input key={i} type="text" className="border-b border-slate-200 h-6 bg-transparent outline-none text-black font-black text-[11px] text-center uppercase" placeholder={`Enter Name...`} value={ban} onChange={e => { const n = [...mobileBans]; n[i] = e.target.value; setMobileBans(n); }} />
                                ))}
                            </div>

                            <div className="flex-1 p-3 flex flex-col justify-between">
                                <div className="flex items-center gap-4 font-black border-b-2 border-slate-100 pb-3">

                                    <input type="text" className="border-2 border-slate-300 w-12 text-center h-8 rounded text-blue-700 text-sm bg-blue-50" value={phoneCalls.today} onChange={e => setPhoneCalls({...phoneCalls, today: e.target.value})} />
                                    <span className="text-slate-500 uppercase text-[9px]">Target:</span>
                                    <input type="text" className="border-2 border-slate-300 w-12 text-center h-8 rounded text-sm bg-slate-50" value={phoneCalls.total} onChange={e => setPhoneCalls({...phoneCalls, total: e.target.value})} />
                                    <span className="italic text-slate-400 uppercase text-[8px] ml-auto tracking-widest">REMARKS / STATUS</span>
                                </div>
                                <textarea placeholder="Type call remarks here..." className="w-full outline-none bg-transparent italic text-[12px] h-12 resize-none leading-tight font-black pt-2 uppercase" value={phoneCalls.reason} onChange={(e) => setPhoneCalls({...phoneCalls, reason: e.target.value})} />
                            </div>
                            
                            <div className="w-1/4 p-4 flex flex-col justify-between items-end bg-slate-50">
                                <div className="flex flex-col gap-2 print-hide w-full items-end">
                                    <div className="flex gap-2">
                                        <button onClick={handleSaveToDashboard} className="text-[8px] bg-green-600 text-white px-3 py-2 rounded shadow-lg font-black uppercase hover:bg-green-700 transition-all flex items-center gap-1">💾 SAVE RECORD</button>
                                        {confirmClear ? (
                                            <button onClick={clearSheetData} className="text-[8px] bg-red-600 text-white px-3 py-2 rounded font-black shadow-lg animate-pulse uppercase">CONFIRM RESET</button>
                                        ) : (
                                            <button onClick={() => setConfirmClear(true)} className="text-[8px] bg-white border-2 border-slate-300 text-slate-600 px-3 py-2 rounded hover:bg-slate-200 font-black uppercase transition-all shadow-sm">Clear Sheet</button>
                                        )}
                                        <button onClick={handlePrint} className="text-[8px] bg-slate-900 text-white px-4 py-2 rounded shadow-lg font-black uppercase hover:bg-black transition-all">SAVE PDF</button>
                                    </div>
                                    <button onClick={handleSaveImage} className="w-full text-[9px] bg-blue-600 text-white px-4 py-2 rounded shadow-lg font-black uppercase hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                                        SAVE AS IMAGE (PNG)
                                    </button>
                                </div>
                                <div className="flex flex-col items-end gap-1">
                                    <div className="font-black text-sm flex gap-2 items-center bg-white border-2 border-slate-200 px-4 py-2 rounded shadow-inner">
                                        <span className="text-slate-400 uppercase text-[7px] shrink-0">Confirmed Date:</span>
                                        <input type="text" value={confirmedDateText} onChange={(e) => setConfirmedDateText(e.target.value)} className="bg-transparent border-none outline-none text-blue-800 font-black w-28 text-right" placeholder="DD/MM/YYYY" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Legend */}
                        <div className="p-3 border-t border-black bg-slate-100">
                            <div className="text-[10px] font-black mb-3 text-slate-500 uppercase italic tracking-widest border-b-2 border-slate-200 pb-1">Sign Meanings / Guide</div>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-y-3 gap-x-4 text-[9px] font-black uppercase tracking-tight leading-none">
                                {symbols.map(s => (
                                    <div key={s.key} className="flex gap-2 items-center">
                                        <span className={`w-5 h-5 flex items-center justify-center rounded-md font-black shadow-sm border ${s.key === 'I' ? 'bg-blue-700 text-white border-blue-800' : s.key === 'L' ? 'bg-red-700 text-white border-red-800' : 'bg-white text-slate-900 border-slate-300'}`}>{s.key}</span> 
                                        <span className="text-slate-600 font-black">{s.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* FIXED DEVELOPER BRANDING INSIDE CARD */}
                        <div className="bg-slate-50 py-2 border-t border-black print-hide flex flex-col items-center gap-1">
                             <div className="text-[10px] font-black uppercase text-slate-800 tracking-[0.1em]">
                                App developed by Arvind Kumar Shukla 9616417485
                             </div>
                             <div className="text-[8px] font-bold text-slate-400 uppercase flex gap-4">
                                <span>Rows: {rows.length}</span>
                                <span>•</span>
                                <span>A4 Landscape Optimized</span>
                             </div>
                        </div>

                        {/* Movable Controller */}
                        {activeCell && (
                            <div style={{ left: `${popupPos.x}px`, top: `${popupPos.y}px`, position: 'fixed' }} className={`bg-slate-900 text-white p-5 rounded-[40px] shadow-[0_30px_60px_rgba(0,0,0,0.6)] flex flex-col gap-6 z-[100] print-hide border-2 border-slate-700 w-[95%] max-w-sm ${isDragging ? 'opacity-90 scale-105 shadow-blue-500/20' : 'transition-transform'}`}>
                                <div onMouseDown={onDragStart} onTouchStart={onDragStart} className="flex items-center justify-between border-b-2 border-slate-800 pb-4 cursor-grab select-none">
                                    <div className="flex bg-slate-800 rounded-2xl p-1.5 text-[10px] font-black">
                                        <button onClick={(e) => {e.stopPropagation(); setActiveTier('a');}} className={`px-5 py-2.5 rounded-xl transition-all ${activeTier === 'a' ? 'bg-blue-600 text-white shadow-xl scale-110' : 'text-slate-400'}`}>TOP</button>
                                        <button onClick={(e) => {e.stopPropagation(); setActiveTier('c');}} className={`px-5 py-2.5 rounded-xl transition-all border-x-2 border-slate-700 ${activeTier === 'c' ? 'bg-blue-600 text-white shadow-xl scale-110' : 'text-blue-500'}`}>CENTER</button>
                                        <button onClick={(e) => {e.stopPropagation(); setActiveTier('b');}} className={`px-5 py-2.5 rounded-xl transition-all ${activeTier === 'b' ? 'bg-blue-600 text-white shadow-xl scale-110' : 'text-slate-400'}`}>BOTTOM</button>
                                    </div>
                                    <button onClick={() => setActiveCell(null)} className="p-3 bg-slate-800 hover:bg-red-600 hover:rotate-90 transition-all rounded-full text-xl leading-none">✕</button>
                                </div>
                                <div className="grid grid-cols-5 gap-3.5">
                                    {symbols.map(s => (
                                        <button key={s.key} onClick={() => addSymbol(s.key)} className={`h-14 rounded-2xl font-black text-2xl transition-all active:scale-90 border-2 shadow-lg flex items-center justify-center ${s.key === 'I' ? 'bg-blue-700 border-blue-500 text-white' : s.key === 'L' ? 'bg-red-700 border-red-500 text-white' : 'bg-slate-800 border-slate-700 text-white'}`}>{s.key}</button>
                                    ))}
                                    <button onClick={deleteOneSymbol} className="h-14 bg-amber-600 text-white border-2 border-amber-500 rounded-2xl font-black text-[10px] uppercase leading-tight hover:bg-amber-500 transition-all text-center shadow-lg active:scale-95">BACK<br/>SPACE</button>
                                    <button onClick={resetActiveCell} className="h-14 bg-red-900 text-red-100 border-2 border-red-800 rounded-2xl font-black text-[10px] uppercase leading-tight hover:bg-red-700 transition-all text-center shadow-lg active:scale-95">RESET<br/>CELL</button>
                                </div>
                            </div>
                        )}
                    </div>
                    ) : (
                        <div className="max-w-[1180px] mx-auto bg-white border-2 border-black relative shadow-2xl p-6 min-h-[800px] print-hide flex flex-col">
                            <div className="flex justify-between items-center border-b-2 border-slate-100 pb-4 mb-6">
                                <div>
                                    <h2 className="text-3xl font-black italic text-slate-900 tracking-tight">PERFORMANCE DASHBOARD</h2>
                                    <p className="text-slate-500 font-bold text-sm uppercase mt-1">Historical Data & Analytics</p>
                                </div>
                                <div className="text-right flex items-center gap-4">
                                    <div className="flex gap-4 items-center bg-blue-50 px-4 py-2 rounded-lg border border-blue-100">
                                        <div className="flex items-center gap-2">
                                            <div className="w-4 h-4 bg-slate-200 rounded-sm"></div>
                                            <span className="text-[10px] font-black text-slate-600 uppercase">Walkins (Attended)</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-4 h-4 bg-blue-600 rounded-sm"></div>
                                            <span className="text-[10px] font-black text-blue-800 uppercase">Converted</span>
                                        </div>
                                    </div>
                                    {confirmClearDash ? (
                                        <button onClick={clearAllRecords} className="bg-red-600 text-white px-4 py-2 rounded text-[10px] font-black uppercase shadow animate-pulse">Confirm Clear All</button>
                                    ) : (
                                        <button onClick={() => setConfirmClearDash(true)} className="bg-white border-2 border-slate-200 text-slate-500 hover:text-red-600 hover:border-red-200 px-4 py-2 rounded text-[10px] font-black uppercase transition-all">Clear History</button>
                                    )}
                                </div>
                            </div>

                            {/* Summary Cards */}
                            <div className="grid grid-cols-4 gap-4 mb-8">
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col">
                                    <span className="text-[10px] uppercase font-black text-slate-400">Total Saved Entries</span>
                                    <span className="text-3xl font-black text-slate-800 mt-1">{savedRecords.length}</span>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col">
                                    <span className="text-[10px] uppercase font-black text-slate-400">Total Attended (All Time)</span>
                                    <span className="text-3xl font-black text-slate-800 mt-1">{totalAttendedAllTime}</span>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col">
                                    <span className="text-[10px] uppercase font-black text-slate-400">Total Converted (All Time)</span>
                                    <span className="text-3xl font-black text-blue-600 mt-1">{totalConvertedAllTime}</span>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col">
                                    <span className="text-[10px] uppercase font-black text-slate-400">Avg. Conversion Rate</span>
                                    <span className="text-3xl font-black text-blue-600 mt-1">{avgConvPct}%</span>
                                </div>
                            </div>

                            {/* Graphical Chart */}
                            <div className="flex-1 bg-white border-2 border-slate-100 rounded-xl p-6 relative min-h-[300px] mb-8 shadow-inner overflow-hidden flex flex-col">
                                <div className="absolute top-4 left-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">Conversion Trend</div>
                                
                                <div className="flex-1 border-b-2 border-l-2 border-slate-800 flex items-end px-4 gap-6 mt-6 pb-0 overflow-x-auto relative">
                                    {/* Y-Axis guide lines */}
                                    <div className="absolute left-0 right-0 top-0 bottom-0 pointer-events-none flex flex-col justify-between opacity-10">
                                        <div className="border-t border-slate-800 w-full h-0"></div>
                                        <div className="border-t border-slate-800 w-full h-0"></div>
                                        <div className="border-t border-slate-800 w-full h-0"></div>
                                        <div className="border-t border-slate-800 w-full h-0"></div>
                                    </div>

                                    {savedRecords.map(record => (
                                        <div key={record.id} className="flex flex-col items-center group relative min-w-[50px] h-full justify-end pt-10">
                                            {/* Tooltip */}
                                            <div className="absolute -top-4 opacity-0 group-hover:opacity-100 bg-slate-900 text-white text-[11px] p-2 rounded pointer-events-none whitespace-nowrap z-10 transition-all shadow-xl font-black flex flex-col items-center">
                                                <span className="text-slate-300">{record.date}</span>
                                                <span><span className="text-slate-400">Attended:</span> {record.attended}</span>
                                                <span><span className="text-blue-400">Converted:</span> {record.converted}</span>
                                                <span className="mt-1 bg-blue-900/50 px-2 py-0.5 rounded text-[9px]">{record.attended ? Math.round(record.converted/record.attended*100) : 0}% Conv.</span>
                                                <div className="w-2 h-2 bg-slate-900 rotate-45 absolute -bottom-1"></div>
                                            </div>
                                            
                                            {/* Bars */}
                                            <div className="w-12 relative flex justify-center items-end h-full mt-auto">
                                                <div style={{ height: `${(record.attended / maxAttended) * 100}%` }} className="w-full bg-slate-200 rounded-t absolute bottom-0 transition-all duration-700 group-hover:bg-slate-300 border-x border-t border-slate-300"></div>
                                                <div style={{ height: `${(record.converted / maxAttended) * 100}%` }} className="w-full bg-blue-600 rounded-t absolute bottom-0 shadow-[0_-2px_10px_rgba(37,99,235,0.3)] transition-all duration-700 group-hover:bg-blue-500 border-x border-t border-blue-700"></div>
                                            </div>
                                            
                                            {/* X-Axis Label */}
                                            <div className="text-[10px] font-black mt-3 mb-2 text-slate-500 rotate-45 origin-left w-16 truncate flex-shrink-0">{record.date.substring(5)}</div>
                                        </div>
                                    ))}
                                    
                                    {savedRecords.length === 0 && (
                                        <div className="absolute inset-0 flex items-center justify-center text-slate-400 font-bold italic w-full pb-10">
                                            No records saved yet. Save a sheet to see the graph!
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Data Table */}
                            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-100 text-[10px] uppercase font-black text-slate-600 border-b border-slate-200">
                                            <th className="p-3">Saved On</th>
                                            <th className="p-3">Sheet Date</th>
                                            <th className="p-3 text-center">Attended</th>
                                            <th className="p-3 text-center">Converted</th>
                                            <th className="p-3 text-center">Conversion %</th>
                                            <th className="p-3 text-center">RP/Ret/Book</th>
                                            <th className="p-3 text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-[11px] font-bold text-slate-800">
                                        {savedRecords.slice().reverse().map(record => (
                                            <tr key={record.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                <td className="p-3">{new Date(record.id).toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'})}</td>
                                                <td className="p-3 text-slate-500">{record.date}</td>
                                                <td className="p-3 text-center">{record.attended}</td>
                                                <td className="p-3 text-center text-blue-600">{record.converted}</td>
                                                <td className="p-3 text-center">
                                                    <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded">
                                                        {record.attended ? Math.round(record.converted/record.attended*100) : 0}%
                                                    </span>
                                                </td>
                                                <td className="p-3 text-center text-slate-500">{record.rp} / {record.ret} / {record.book}</td>
                                                <td className="p-3 text-right">
                                                    <button onClick={() => deleteRecord(record.id)} className="text-red-500 hover:bg-red-50 p-2 rounded transition-all">
                                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                        {savedRecords.length === 0 && (
                                            <tr>
                                                <td colSpan="7" className="p-4 text-center text-slate-400 italic font-medium text-sm">No historical data available.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
