
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhamaka Pro Ultra | Achievement Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Data Repositories ---
        const DATA = {
            quotes: [
                "Success is not just about what you accomplish, it's about what you inspire others to do.",
                "Hard work beats talent when talent doesn't work hard.",
                "Great things never come from comfort zones.",
                "Your attitude determines your direction. Keep soaring high!",
                "Every achievement is a victory for the whole team. Keep pushing!",
                "Excellence is not a skill, it is an attitude."
            ],
            hooks: [
                "Today’s performance includes a remarkable bill achievement.",
                "Witness a masterclass in sales excellence right here.",
                "Setting new benchmarks with every single transaction.",
                "Consistency and hard work lead to these massive results.",
                "Breaking records is a habit for our top performers.",
                "The power of persistence reflected in today's numbers."
            ],
            presentations: [
                "RC-2 proudly presents today’s achievement:",
                "Spotlight on today’s extraordinary sales achievement:",
                "Presenting a powerhouse performance that inspires us all:",
                "Joining together to celebrate a massive win:",
                "Applauding a phenomenal milestone by our star achiever:"
            ]
        };

        // --- State ---
        window.achieverNames = ["AMAN KUMAR", "SUMIT SHARMA", "RAHUL VERMA", "VIKAS GUPTA"];
        let db, auth, appId, currentUser = null;

        // --- Core UI Logic ---
        const updatePreview = () => {
            const getVal = (id) => document.getElementById(id).value;
            const amt = getVal('billAmount') ? Number(getVal('billAmount')).toLocaleString('en-IN') : "0";
            const type = getVal('achievementType') === 'CUSTOM' ? getVal('customType') : getVal('achievementType');
            
            const e1 = (getVal('emoji1') || "").repeat(10);
            const e2 = (getVal('emoji2') || "").repeat(10);
            const e3 = (getVal('emoji3') || "").repeat(10);
            const e4 = (getVal('emoji4') || "").repeat(10);

            const message = `*💥DHAMAKA NO: ${getVal('dhamakaNo')} (${getVal('prefixText')}${getVal('suffixNo')}) OF THE DAY💥*

*${getVal('groupTagline')}*

${e1}
           *${type}*

*_“${getVal('hookStatement')}”_*
${e1}

${e2}
*${getVal('presentationLine')}*
${e2}

${e3}

*Single Bill: ₹ ${amt}/-*
*Achiever:  ${getVal('achieverSelect')}*

${e3}

⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️
*${getVal('quote')}*
⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️⭐️

${e4}
*_${getVal('footerMsg')}_*
${e4}`;

            document.getElementById('messagePreview').innerText = message;
        };

        const renderAchieverList = () => {
            const sel = document.getElementById('achieverSelect');
            const prev = sel.value;
            sel.innerHTML = window.achieverNames.map(n => `<option value="${n}">${n}</option>`).join('');
            if (window.achieverNames.includes(prev)) sel.value = prev;

            document.getElementById('chipsContainer').innerHTML = window.achieverNames.map((n, i) => `
                <div class="bg-slate-800/50 border border-slate-700 px-3 py-1 rounded-full flex items-center gap-2 text-[10px] font-bold text-slate-300">
                    ${n} <button data-index="${i}" class="del-btn text-orange-500 hover:text-orange-400">×</button>
                </div>
            `).join('');
        };

        const toast = (msg) => {
            const el = document.getElementById('toast');
            document.getElementById('toastText').innerText = msg;
            el.style.opacity = '1';
            el.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translate(-50%, 0)';
            }, 3000);
        };

        // --- Cloud / Firebase Logic ---
        async function setupCloud() {
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configStr) return;

                const config = JSON.parse(configStr);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'dhamaka-ultra-final';

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    const params = new URLSearchParams(window.location.search);
                    const sid = params.get('shareId');
                    if (sid && user) loadShared(sid);
                });
            } catch (err) {
                console.error("Cloud Error:", err);
            }
        }

        async function loadShared(sid) {
            if (!db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shares', sid);
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const d = snap.data();
                    const set = (id, v) => { if(document.getElementById(id)) document.getElementById(id).value = v; };
                    
                    set('dhamakaNo', d.dhamakaNo);
                    set('prefixText', d.prefixText);
                    set('suffixNo', d.suffixNo);
                    set('groupTagline', d.groupTagline);
                    set('hookStatement', d.hookStatement);
                    set('presentationLine', d.presentationLine);
                    set('billAmount', d.billAmount);
                    set('footerMsg', d.footerMsg);
                    set('quote', d.quote);
                    
                    if (d.emojis) {
                        set('emoji1', d.emojis[0]);
                        set('emoji2', d.emojis[1]);
                        set('emoji3', d.emojis[2]);
                        set('emoji4', d.emojis[3]);
                    }

                    if (d.achiever && !window.achieverNames.includes(d.achiever)) {
                        window.achieverNames.push(d.achiever);
                    }
                    
                    renderAchieverList();
                    set('achieverSelect', d.achiever);
                    set('achievementType', d.achievementType);
                    set('customType', d.customType);
                    
                    document.getElementById('customType').classList.toggle('hidden', d.achievementType !== 'CUSTOM');
                    updatePreview();
                    toast("Shared Dhamaka Loaded 📥");
                }
            } catch (e) { console.error(e); }
        }

        // --- Init & Events ---
        window.addEventListener('DOMContentLoaded', () => {
            // Field Listeners
            const fields = ['dhamakaNo', 'prefixText', 'suffixNo', 'groupTagline', 'hookStatement', 'presentationLine', 'billAmount', 'footerMsg', 'quote', 'emoji1', 'emoji2', 'emoji3', 'emoji4', 'customType'];
            fields.forEach(f => document.getElementById(f).addEventListener('input', updatePreview));

            document.getElementById('achievementType').addEventListener('change', (e) => {
                document.getElementById('customType').classList.toggle('hidden', e.target.value !== 'CUSTOM');
                updatePreview();
            });

            document.getElementById('achieverSelect').addEventListener('change', updatePreview);

            // Button Listeners
            document.getElementById('addNameBtn').addEventListener('click', () => {
                const input = document.getElementById('newName');
                const name = input.value.trim().toUpperCase();
                if (name && !window.achieverNames.includes(name)) {
                    window.achieverNames.push(name);
                    renderAchieverList();
                    document.getElementById('achieverSelect').value = name;
                    updatePreview();
                    input.value = '';
                }
            });

            document.getElementById('chipsContainer').addEventListener('click', (e) => {
                if (e.target.classList.contains('del-btn')) {
                    const idx = parseInt(e.target.getAttribute('data-index'));
                    if (window.achieverNames.length > 1) {
                        window.achieverNames.splice(idx, 1);
                        renderAchieverList();
                        updatePreview();
                    }
                }
            });

            document.getElementById('shuffleHook').addEventListener('click', () => {
                document.getElementById('hookStatement').value = DATA.hooks[Math.floor(Math.random() * DATA.hooks.length)];
                updatePreview();
            });

            document.getElementById('shufflePres').addEventListener('click', () => {
                document.getElementById('presentationLine').value = DATA.presentations[Math.floor(Math.random() * DATA.presentations.length)];
                updatePreview();
            });

            document.getElementById('shuffleQuote').addEventListener('click', () => {
                document.getElementById('quote').value = `“${DATA.quotes[Math.floor(Math.random() * DATA.quotes.length)]}”`;
                updatePreview();
            });

            document.getElementById('copyBtn').addEventListener('click', () => {
                const ta = document.createElement('textarea');
                ta.value = document.getElementById('messagePreview').innerText;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                toast("WhatsApp Message Copied! 📋");
            });

            document.getElementById('shareLinkBtn').addEventListener('click', async () => {
                if (!currentUser || !db) return toast("Cloud Link unavailable");
                
                const payload = {
                    dhamakaNo: document.getElementById('dhamakaNo').value,
                    prefixText: document.getElementById('prefixText').value,
                    suffixNo: document.getElementById('suffixNo').value,
                    groupTagline: document.getElementById('groupTagline').value,
                    hookStatement: document.getElementById('hookStatement').value,
                    presentationLine: document.getElementById('presentationLine').value,
                    achiever: document.getElementById('achieverSelect').value,
                    achievementType: document.getElementById('achievementType').value,
                    customType: document.getElementById('customType').value,
                    billAmount: document.getElementById('billAmount').value,
                    emojis: [
                        document.getElementById('emoji1').value,
                        document.getElementById('emoji2').value,
                        document.getElementById('emoji3').value,
                        document.getElementById('emoji4').value
                    ],
                    footerMsg: document.getElementById('footerMsg').value,
                    quote: document.getElementById('quote').value,
                    timestamp: Date.now()
                };

                try {
                    toast("Creating cloud share...");
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
                    const docRef = await addDoc(colRef, payload);
                    
                    const url = new URL(window.location.href);
                    url.searchParams.set('shareId', docRef.id);
                    
                    const ta = document.createElement('textarea');
                    ta.value = url.toString();
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    toast("Public Link Generated & Copied! 🔗");
                } catch (e) { toast("Sharing failed."); }
            });

            // Initial UI State
            renderAchieverList();
            updatePreview();
            setupCloud();
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Space+Grotesk', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .preview-pane { font-family: 'Segoe UI', Tahoma, sans-serif; white-space: pre-wrap; word-break: break-word; }
        input, select, textarea { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2); }
        .bg-gradient-mesh { background-color: #020617; background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>

                        <div class="flex gap-3 opacity-60">

                    <!-- Message Preview -->
                    <div class="flex-1 p-5 preview-pane text-[13px] text-[#e9edef] custom-scroll overflow-y-auto bg-opacity-20" id="messagePreview" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay;">
                    </div>

                    <!-- Bottom Bar -->
